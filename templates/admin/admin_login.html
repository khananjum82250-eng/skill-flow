<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SkillFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=admin-user-theme-1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/skillflow_ui.css') }}?v=safe-dropdown-theme-1">
</head>
<body class="admin-body">
  <main class="admin-login">
    <section class="login-panel">
      <div class="logo-box">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" fill="url(#logoGrad)"/>
            <path d="M10 20 Q16 8 22 20" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M8 14 Q16 26 24 14" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#9b85ff"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
          </svg>
        </div>
        <span class="logo-text">SkillFlow</span>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
      {% endwith %}
      <form class="admin-form" method="post" action="{{ url_for('admin_login_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Username<input type="text" name="username" placeholder="Username" autocomplete="username" required></label>
        <label class="admin-password-field">
          <span>Password</span>
          <input id="adminPasswordInput" type="password" name="password" placeholder="Password" autocomplete="current-password" required>
          <button class="admin-password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <i class="fa-regular fa-eye"></i>
          </button>
        </label>
        <button class="admin-button" type="submit">Login</button>
      </form>
      <a class="admin-forgot-link" href="{{ url_for('admin_forgot_password_page') }}">Forgot Password?</a>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/skillflow_ui.js') }}?v=csrf-1"></script>
  <script>
    document.querySelectorAll('.admin-password-toggle').forEach((button) => {
      button.addEventListener('click', () => {
        const field = button.closest('.admin-password-field');
        const input = field ? field.querySelector('input') : null;
        const icon = button.querySelector('i');
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        button.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        button.setAttribute('aria-pressed', String(show));
        if (icon) {
          icon.classList.toggle('fa-eye', !show);
          icon.classList.toggle('fa-eye-slash', show);
        }
      });
    });
  </script>
</body>
</html>
