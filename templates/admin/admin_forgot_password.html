<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - SkillFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=admin-user-theme-1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/skillflow_ui.css') }}?v=safe-dropdown-theme-1">
</head>
<body class="admin-body admin-reset-page">
  <main class="admin-login">
    <section class="login-panel admin-reset-panel">
      <div class="logo-box">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" fill="url(#logoGrad)"/>
            <path d="M10 20 Q16 8 22 20" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M8 14 Q16 26 24 14" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#9b85ff"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
          </svg>
        </div>
        <span class="logo-text">SkillFlow</span>
      </div>

      <div class="admin-reset-heading">
        <h1>Reset Admin Password</h1>
        <p>Enter the admin email to receive a 6-digit reset code.</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
      {% endwith %}

      <form class="admin-form admin-reset-form" method="post" action="{{ url_for('admin_forgot_password_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="request_code">
        <label>Admin email
          <input type="email" name="email" value="{{ reset_email or '' }}" autocomplete="email" required>
        </label>
        <button class="admin-button" type="submit">Send Reset Code</button>
      </form>

      {% if show_reset_form %}
      <form class="admin-form admin-reset-form" method="post" action="{{ url_for('admin_forgot_password_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="reset_password">
        <label>Email
          <input type="email" name="email" value="{{ reset_email or '' }}" autocomplete="email" required>
        </label>
        <label>Reset code
          <input type="text" name="reset_code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>
        </label>
        <label class="admin-password-field">New Password
          <input type="password" name="new_password" autocomplete="new-password" required>
          <button class="admin-password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <i class="fa-regular fa-eye"></i>
          </button>
        </label>
        <label class="admin-password-field">Confirm Password
          <input type="password" name="confirm_password" autocomplete="new-password" required>
          <button class="admin-password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <i class="fa-regular fa-eye"></i>
          </button>
        </label>
        <button class="admin-button" type="submit">Reset Password</button>
      </form>
      {% endif %}

      <a class="admin-forgot-link admin-back-link" href="{{ url_for('admin_login_page') }}">Back to Login</a>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/skillflow_ui.js') }}?v=csrf-1"></script>
  <script>
    document.querySelectorAll('.admin-password-toggle').forEach((button) => {
      button.addEventListener('click', () => {
        const field = button.closest('.admin-password-field');
        const input = field ? field.querySelector('input') : null;
        const icon = button.querySelector('i');
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        button.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        button.setAttribute('aria-pressed', String(show));
        if (icon) {
          icon.classList.toggle('fa-eye', !show);
          icon.classList.toggle('fa-eye-slash', show);
        }
      });
    });
  </script>
</body>
</html>
