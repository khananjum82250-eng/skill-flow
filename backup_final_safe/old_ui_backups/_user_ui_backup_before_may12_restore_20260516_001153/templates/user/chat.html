<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Skill Swapping</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=brand-sidebar-1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/skillflow_ui.css') }}?v=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat_style.css') }}">
</head>
<body class="app-layout chat-page">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" fill="url(#logoGrad)"/>
            <path d="M10 20 Q16 8 22 20" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M8 14 Q16 26 24 14" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#9b85ff"/>
                <stop offset="100%" stop-color="#7C3AED"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">SkillFlow</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard_page') }}" class="nav-item">
        <i class="fa-solid fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="{{ url_for('search_page') }}" class="nav-item">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Search</span>
      </a>
      <a href="{{ url_for('requests_page') }}" class="nav-item">
        <i class="fa-solid fa-handshake"></i>
        <span>Requests</span>
      </a>
      <a href="{{ url_for('chat_page') }}" class="nav-item active">
        <i class="fa-regular fa-message"></i>
        <span>Chat</span>
      </a>
      <a href="{{ url_for('profile_page') }}" class="nav-item">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="{{ url_for('logout') }}" class="nav-item logout-item">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="chat-topbar">
      <div class="chat-page-title">&middot; Chat - Skill Swapping</div>
      <div class="chat-topbar-profile">
        <img class="chat-topbar-avatar" src="{{ user.avatar_url }}" alt="Profile avatar">
        <div class="chat-topbar-name">
          <span>Welcome,</span>
          <strong>{{ user.full_name.split(' ')[0] if user.full_name else user.username }}</strong>
        </div>
        <i class="fa-solid fa-chevron-down chat-topbar-chevron"></i>
      </div>
    </div>

    <section class="glass-panel chat-shell" id="chatApp" data-user-id="{{ user.id }}" data-selected-request-id="{{ selected_request_id }}" data-selected-user-id="{{ selected_user_id }}">
      <div class="chat-sidebar-panel">
        <div class="chat-list-header">
          <h2 class="section-title">Accepted Chats</h2>
          <span id="chatCount" class="chat-count">0</span>
        </div>
        <div class="chat-list" id="chatList">
          <div class="chat-empty">Loading chats...</div>
        </div>
      </div>

      <div class="chat-window-panel">
        <div class="chat-window-empty" id="emptyState">
          <i class="fa-regular fa-message"></i>
          <p>Select an accepted match to open chat.</p>
          <button id="globalUnlockBtn" class="btn-primary chat-unlock-button" type="button">
            <i class="fa-solid fa-lock"></i>
            Unlock Chat
          </button>
        </div>

        <div class="chat-window" id="activeChat" hidden>
          <div class="chat-window-header">
            <div class="chat-user-summary">
              <img id="activeAvatar" class="chat-avatar" src="" alt="User avatar">
              <div>
                <h2 id="activeName">Chat</h2>
                <span id="activeStatus" class="chat-status">Locked</span>
              </div>
            </div>
            <button id="unlockBtn" class="btn-primary chat-unlock-button" type="button">
              <i class="fa-solid fa-lock"></i>
              Unlock Chat
            </button>
            <button id="reportChatBtn" class="btn-primary chat-unlock-button" type="button" hidden>
              <i class="fa-solid fa-flag"></i>
              Report
            </button>
          </div>

          <div class="chat-lock-banner" id="lockBanner">
            <i class="fa-solid fa-lock"></i>
            <span>Chat is locked. Unlock to start conversation</span>
          </div>

          <div class="chat-contact-box" id="contactBox" hidden></div>
          <div class="messages" id="messagesContainer"></div>

          <form class="chat-input-area" id="chatForm">
            <input type="text" id="chatInput" placeholder="Unlock chat to start typing" autocomplete="off" disabled>
            <button id="sendBtn" class="btn-primary chat-send-button" type="submit" disabled>
              <i class="fa-regular fa-paper-plane"></i>
              <span>Send</span>
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/skillflow_ui.js') }}?v=1"></script>
  <script src="{{ url_for('static', filename='js/user.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chat_script.js') }}?v=phonepe-fix-2"></script>
</body>
</html>
