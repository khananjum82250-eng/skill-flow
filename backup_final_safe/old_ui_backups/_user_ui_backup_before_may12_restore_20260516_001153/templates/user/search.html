<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillFlow - Search</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=brand-sidebar-1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/skillflow_ui.css') }}?v=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/search_style.css') }}?v=profile-actions-1">
</head>

<body class="app-layout search-page">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="15" fill="url(#logoGrad)"/>
                        <path d="M10 20 Q16 8 22 20" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                        <path d="M8 14 Q16 26 24 14" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
                                <stop offset="0%" stop-color="#9b85ff"/>
                                <stop offset="100%" stop-color="#7C3AED"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">SkillFlow</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard_page') }}" class="nav-item">
                <i class="fa-solid fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="{{ url_for('search_page') }}" class="nav-item active">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </a>
            <a href="{{ url_for('requests_page') }}" class="nav-item">
                <i class="fa-solid fa-handshake"></i>
                <span>Requests</span>
            </a>
            <a href="{{ url_for('chat_page') }}" class="nav-item">
                <i class="fa-regular fa-message"></i>
                <span>Chat</span>
            </a>
            <a href="{{ url_for('profile_page') }}" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="nav-item logout-item">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h1>Find Skill Partners</h1>
            <p>Search real users by the skills they teach, want to learn, or their username.</p>
        </div>

        <section class="glass-panel search-panel">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="search" id="searchInput" placeholder="Search users by skills..." autocomplete="off">
            </div>
        </section>

        <section class="glass-panel search-results-panel">
            <div class="search-results-header">
                <h2 class="section-title">Search Results</h2>
                <span id="resultCount" class="result-count">0</span>
            </div>
            <div id="searchResults" class="search-results">
                <div class="search-empty">
                    <i class="fa-solid fa-keyboard"></i>
                    <p>Start typing to search users</p>
                </div>
            </div>
        </section>
    </main>
    
  <script src="{{ url_for('static', filename='js/skillflow_ui.js') }}?v=1"></script>
  <script src="{{ url_for('static', filename='js/search_script.js') }}?v=profile-actions-1"></script>
</body>
</html>
